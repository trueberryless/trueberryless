<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bento Grid</title>
        <style>
            body {
                background-color: #121212;
                color: white;
                font-family: Arial, sans-serif;
                margin: 0;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
                width: 800px;
                padding: 20px;
                background: #080b0f;
                border-radius: 10px;
            }
            .box {
                background: #0d1117;
                padding: 20px;
                border-radius: 5px;
                text-align: center;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            .bento-img {
                width: 100%;
                border-radius: 10px;
                display: block;
            }
            .box > svg,
            .box > a > svg {
                width: 100%;
                border-radius: 10px;
                display: block;
            }
            .trueberryless {
                background: url("./img/felix.png") no-repeat center center/cover;
                border-radius: 15px;
                padding: 0;
            }
            .trueberryless > a {
                position: relative;
                border-radius: 10px;
                text-align: center;
                backdrop-filter: blur(3px);
                background: rgba(0, 0, 0, 0.5);
                padding: 20px;
                color: white;
                text-decoration: none;
            }
            .badges-container {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
        </style>
    </head>
    <body>
        <div class="grid">
            <div class="box trueberryless" style="grid-column: span 2">
                <a href="https://trueberryless.org">
                    <div>
                        <h2>Felix Schneider</h2>
                    </div>
                </a>
            </div>

            <div class="badges-container" style="grid-column: span 1">
                <div class="box">
                    <a href="https://astro.badg.es/contributor/trueberryless/">
                        <img
                            class="bento-img"
                            src="https://astro.badg.es/v2/contributor/trueberryless.svg"
                            alt="Astro Contributor"
                            style="border-radius: 0"
                        />
                    </a>
                </div>
                <div class="box">
                    <a href="https://npmxers.trueberryless.org/trueberryless">
                        <img
                            class="bento-img"
                            src="https://npmxers.trueberryless.org/_og/r/trueberryless.png"
                            alt="trueberryless npmxer profile"
                        />
                    </a>
                </div>
            </div>

            <div class="box" style="grid-column: span 1">
                <a
                    href="https://open.spotify.com/user/pjyifjjapvah0yoy2zvd8vx0v?si=2f25a955da0b470f"
                    >{{SPOTIFY_SVG}}</a
                >
            </div>

            <div class="box" style="grid-column: span 2">
                <a href="https://github.com/Platane/snk">{{SNAKE_SVG}}</a>
            </div>
        </div>
    </body>
</html>
