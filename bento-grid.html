<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Bento Grid</title>
        <style>
            body {
                background-color: #121212;
                color: white;
                font-family: Arial, sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                margin: 0;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(1, 1fr);
                gap: 20px;
                width: 800px;
                padding: 20px;
                background: #080b0f;
                border-radius: 10px;
            }
            .box {
                background: #0d1117;
                padding: 20px;
                border-radius: 5px;
                text-align: center;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            img {
                width: 100%;
                border-radius: 10px;
                display: block;
            }
            .trueberryless {
                background: url("./img/felix.png") no-repeat center center/cover;
                border-radius: 15px;
                padding: 0;
            }
            .trueberryless > a {
                position: relative;
                border-radius: 10px;
                text-align: center;
                backdrop-filter: blur(3px);
                background: rgba(0, 0, 0, 0.5);
                padding: 20px;
                color: white;
                text-decoration: none;
            }
            .badges-container {
                display: flex;
                flex-direction: column;
                gap: 20px;
            }
        </style>
    </head>
    <body>
        <div class="grid">
            <div class="box trueberryless" style="grid-column: span 2">
                <a href="https://trueberryless.org">
                    <div>
                        <h2>Felix Schneider</h2>
                    </div>
                </a>
            </div>

            <div class="badges-container" style="grid-column: span 1">
                <div class="box">
                    <a href="https://astro.badg.es/contributor/trueberryless/">
                        <img
                            src="https://astro.badg.es/v2/contributor/trueberryless.svg"
                            alt="Astro Contributor"
                            style="border-radius: 0"
                        />
                    </a>
                </div>
                <div class="box">
                    <a href="https://npmxers.trueberryless.org/trueberryless">
                        <img
                            src="https://npmxers.trueberryless.org/_og/r/trueberryless.png"
                            alt="trueberryless npmxer profile"
                        />
                    </a>
                </div>
            </div>

            <div class="box" style="grid-column: span 1">
                <img
                    src="https://spotify-github-profile.kittinanx.com/api/view?uid=pjyifjjapvah0yoy2zvd8vx0v&cover_image=true&theme=default&show_offline=false&background_color=0d1117&interchange=true"
                    alt="Spotify Now Playing"
                />
            </div>

            <div class="box" style="grid-column: span 2">
                <a href="https://github.com/Platane/snk">
                    <picture>
                        <source
                            media="(prefers-color-scheme: dark)"
                            srcset="
                                https://raw.githubusercontent.com/trueberryless/trueberryless/snake/github-contribution-grid-snake-dark.svg
                            "
                        />
                        <source
                            media="(prefers-color-scheme: light)"
                            srcset="
                                https://raw.githubusercontent.com/trueberryless/trueberryless/snake/github-contribution-grid-snake.svg
                            "
                        />
                        <img
                            alt="github-snake"
                            src="https://raw.githubusercontent.com/trueberryless/trueberryless/snake/github-contribution-grid-snake.svg"
                        />
                    </picture>
                </a>
            </div>
        </div>
    </body>
</html>
